openapi: 3.0.1
info:
  title: Salesforce to Stripe Customer Sync Integration
  description: Event-driven integration that syncs Salesforce Accounts and Contacts to Stripe
  version: 1.0.0
  contact:
    name: Integration Support
    url: https://www.devant.io

servers:
  - url: http://localhost:9090

paths:
  /health:
    get:
      summary: Health check endpoint
      description: Returns the health status of the integration
      operationId: healthCheck
      responses:
        '200':
          description: Integration is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Integration is unhealthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /metrics:
    get:
      summary: Integration metrics
      description: Returns metrics about synced records
      operationId: getMetrics
      responses:
        '200':
          description: Metrics retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricsResponse'

components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum:
            - HEALTHY
            - UNHEALTHY
          description: Health status
        timestamp:
          type: string
          format: date-time
          description: Timestamp of the health check
        message:
          type: string
          description: Status message

    MetricsResponse:
      type: object
      properties:
        accountsSynced:
          type: integer
          description: Total Accounts synced
        contactsSynced:
          type: integer
          description: Total Contacts synced
        accountsCreated:
          type: integer
          description: Accounts created in Stripe
        accountsUpdated:
          type: integer
          description: Accounts updated in Stripe
        accountsDeleted:
          type: integer
          description: Accounts deleted in Stripe
        contactsCreated:
          type: integer
          description: Contacts created in Stripe
        contactsUpdated:
          type: integer
          description: Contacts updated in Stripe
        contactsDeleted:
          type: integer
          description: Contacts deleted in Stripe
        syncErrors:
          type: integer
          description: Total synchronization errors
        lastSyncTimestamp:
          type: string
          format: date-time
          description: Timestamp of last successful sync

    SalesforceAccountPayload:
      type: object
      properties:
        Id:
          type: string
          description: Salesforce Account ID
        Name:
          type: string
          description: Account name
        Email__c:
          type: string
          description: Account email
        Phone:
          type: string
          description: Account phone number
        BillingStreet:
          type: string
        BillingCity:
          type: string
        BillingState:
          type: string
        BillingPostalCode:
          type: string
        BillingCountry:
          type: string
        Description:
          type: string
        Stripe_Customer_Id__c:
          type: string
          description: Stripe customer ID

    SalesforceContactPayload:
      type: object
      properties:
        Id:
          type: string
          description: Salesforce Contact ID
        FirstName:
          type: string
        LastName:
          type: string
        Email:
          type: string
        Phone:
          type: string
        MailingStreet:
          type: string
        MailingCity:
          type: string
        MailingState:
          type: string
        MailingPostalCode:
          type: string
        MailingCountry:
          type: string
        Description:
          type: string
        Stripe_Customer_Id__c:
          type: string
          description: Stripe customer ID

    StripeCustomerPayload:
      type: object
      properties:
        id:
          type: string
          description: Stripe customer ID
        email:
          type: string
          description: Customer email
        name:
          type: string
          description: Customer name
        phone:
          type: string
          description: Customer phone
        address:
          type: object
          properties:
            line1:
              type: string
            line2:
              type: string
            city:
              type: string
            state:
              type: string
            postal_code:
              type: string
            country:
              type: string
        description:
          type: string
        metadata:
          type: object
          description: Custom metadata (includes external_id for matching)

    ErrorResponse:
      type: object
      properties:
        errorCode:
          type: string
          description: Error code
        message:
          type: string
          description: Error message
        details:
          type: string
          description: Additional error details
        timestamp:
          type: string
          format: date-time
          description: Timestamp of the error


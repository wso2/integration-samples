services:
  postgres:
    image: postgres:16-alpine
    container_name: db_persist_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: db_persist
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d db_persist"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

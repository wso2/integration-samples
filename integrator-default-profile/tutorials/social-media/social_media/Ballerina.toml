[package]
org = "wso2"
name = "social_media"
version = "0.1.0"
distribution = "2201.13.3"
title = "social-media"

[build-options]
sticky = true




[[tool.persist]]
id = "social_media.socialmedia"
targetModule = "social_media.socialmedia"
filePath = "persist/dbClient/model.bal"
options.datastore = "mysql"
options.eagerLoading = true
options.withInitParams = true




[[dependency]]
org = "ballerina"
name = "tool.persist"
version = "1.9.1"

[[platform.java21.dependency]]
groupId = "io.ballerina.stdlib"
artifactId = "persist.sql-native"
version = "1.7.2"

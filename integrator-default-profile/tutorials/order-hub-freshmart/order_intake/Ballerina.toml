[package]
org = "wso2"
name = "order_intake"
version = "0.1.0"
distribution = "2201.13.4"
title = "order-intake"

[build-options]
sticky = true

[[tool.persist]]
id = "order_intake.orderhub"
targetModule = "order_intake.orderhub"
filePath = "persist/dbClient/model.bal"
options.datastore = "mysql"
options.eagerLoading = true
options.withInitParams = true

[[dependency]]
org = "ballerina"
name = "tool.persist"
version = "1.9.1"

[[platform.java21.dependency]]
groupId = "io.ballerina.stdlib"
artifactId = "persist.sql-native"
version = "1.7.2"
